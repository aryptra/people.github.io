
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People in Earth</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Discord Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration & Custom Styles -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'discord': '#5865F2',
                        'discord-hover': '#4752C4',
                        'earth-bg': '#f9f8f6',
                        'earth-text': '#2c2925'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.earth-bg');
            color: theme('colors.earth-text');
        }
        
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Hero Section -->
    <header class="relative w-full h-[50vh] min-h-[400px] flex items-center justify-center overflow-hidden">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <img src="https://files.catbox.moe/hd0b8b.jpg" alt="People in Earth Background" class="w-full h-full object-cover filter brightness-[0.6] hover:scale-105 transition-transform duration-1000">
        </div>
        
        <!-- Hero Content -->
        <div class="relative z-10 text-center px-4 fade-in-up">
            <h1 class="text-5xl sm:text-7xl font-bold text-white tracking-wide mb-4 drop-shadow-lg">
                People in Earth
            </h1>
            <p class="text-gray-200 text-lg sm:text-xl font-light tracking-widest uppercase mt-2">
                Discord Community
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 sm:px-6 py-16 -mt-16 relative z-20 max-w-4xl">
        
        <!-- About & Action Card -->
        <div class="glass-panel rounded-3xl shadow-xl p-8 sm:p-12 text-center fade-in-up delay-100">
            <div class="mb-8">
                <i class="fa-solid fa-earth-americas text-4xl text-gray-300 mb-6"></i>
                <h2 class="text-2xl sm:text-3xl font-semibold mb-4 text-gray-800">About the server</h2>
                <p class="text-lg text-gray-600 max-w-2xl mx-auto leading-relaxed">
                    You can make new friends, play games, or just exchange stories here, so enjoy ^^
                </p>
            </div>

            <!-- Discord Join Button -->
            <a href="https://discord.gg/MsZsmg7mV" target="_blank" rel="noopener noreferrer" 
               class="inline-flex items-center justify-center gap-3 bg-discord hover:bg-discord-hover text-white font-semibold py-4 px-10 rounded-full transition-all duration-300 transform hover:-translate-y-1 hover:shadow-lg hover:shadow-discord/30 group">
                <i class="fa-brands fa-discord text-2xl group-hover:animate-bounce"></i>
                <span class="text-lg">Join the Server</span>
            </a>
        </div>

        <!-- Influential People Section -->
        <div class="mt-20 mb-10 text-center fade-in-up delay-200">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-[0.2em] mb-10">
                Influential People Who Created This Server
            </h3>
            
            <div class="flex flex-wrap justify-center gap-4 sm:gap-6">
                <!-- Creator Cards -->
                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-3 hover:shadow-md transition-shadow">
                    <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
                        <i class="fa-solid fa-user-astronaut"></i>
                    </div>
                    <span class="font-medium text-gray-700">Arya</span>
                </div>

                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-3 hover:shadow-md transition-shadow">
                    <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500">
                        <i class="fa-solid fa-seedling"></i>
                    </div>
                    <span class="font-medium text-gray-700">Tera</span>
                </div>

                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-3 hover:shadow-md transition-shadow">
                    <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-purple-500">
                        <i class="fa-solid fa-ghost"></i>
                    </div>
                    <span class="font-medium text-gray-700">jauhari</span>
                </div>

                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-3 hover:shadow-md transition-shadow">
                    <div class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center text-amber-500">
                        <i class="fa-solid fa-fire-flame-curved"></i>
                    </div>
                    <span class="font-medium text-gray-700">Melvin</span>
                </div>

                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-3 hover:shadow-md transition-shadow">
                    <div class="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center text-rose-500">
                        <i class="fa-solid fa-meteor"></i>
                    </div>
                    <span class="font-medium text-gray-700">Bisma</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-8 text-center text-gray-400 text-sm fade-in-up delay-300">
        <p>© 2026 People in Earth. All rights reserved.</p>
    </footer>

</body>
</html>
