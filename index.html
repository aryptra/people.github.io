
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People in Earth</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for the Discord icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f1ebd9',
                            dark: '#1e2d2f',
                            accent: '#476268',
                            discord: '#5865F2',
                            cream: '#fcfaf2'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg text-brand-dark font-sans antialiased">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-brand-bg/90 backdrop-blur-md border-b border-brand-accent/10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <span class="font-display font-bold text-xl tracking-wide uppercase">People in Earth</span>
            <a href="https://discord.gg/MsZsmg7mV" target="_blank" rel="noopener noreferrer" class="flex items-center space-x-2 bg-brand-discord text-white px-5 py-2.5 rounded-full text-sm font-semibold hover:opacity-90 transition-opacity">
                <i class="fa-brands fa-discord text-lg"></i>
                <span>Join Server</span>
            </a>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="max-w-6xl mx-auto px-6 py-16 md:py-24 flex flex-col md:flex-row items-center gap-12">
            <div class="flex-1 space-y-6 text-center md:text-left">
                <h1 class="font-display text-5xl md:text-7xl font-extrabold tracking-tight text-brand-dark">
                    People in Earth
                </h1>
                <p class="text-xl text-brand-dark/80 leading-relaxed max-w-xl mx-auto md:mx-0">
                    You can make new friends, play games, or just exchange stories here, so enjoy ^^
                </p>
                <div class="pt-4">
                    <a href="https://discord.gg/MsZsmg7mV" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center space-x-3 bg-brand-discord text-white px-8 py-4 rounded-full text-lg font-bold shadow-lg transition-transform hover:scale-105">
                        <i class="fa-brands fa-discord text-xl"></i>
                        <span>Join Community</span>
                    </a>
                </div>
            </div>

            <!-- Image Showcase -->
            <div class="flex-1 flex justify-center">
                <div class="w-72 h-72 md:w-96 md:h-96 rounded-2xl shadow-2xl overflow-hidden border-4 border-white bg-white">
                    <img 
                        src="https://files.catbox.moe/hd0b8b.jpg" 
                        alt="Community Visual" 
                        class="w-full h-full object-cover"
                    />
                </div>
            </div>
        </section>

        <!-- Founders Section -->
        <section id="founders" class="bg-brand-cream py-20">
            <div class="max-w-6xl mx-auto px-6">
                <div class="text-center mb-16">
                    <h2 class="font-display text-4xl font-extrabold text-brand-dark mb-4">Influential Creators</h2>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-5xl mx-auto">
                    <div class="bg-brand-bg border border-brand-accent/10 rounded-2xl p-6 text-center">
                        <div class="w-16 h-16 mx-auto rounded-full bg-brand-accent/20 flex items-center justify-center font-bold text-xl mb-4">A</div>
                        <h3 class="font-bold">Arya</h3>
                    </div>
                    <div class="bg-brand-bg border border-brand-accent/10 rounded-2xl p-6 text-center">
                        <div class="w-16 h-16 mx-auto rounded-full bg-brand-accent/20 flex items-center justify-center font-bold text-xl mb-4">T</div>
                        <h3 class="font-bold">Tera</h3>
                    </div>
                    <div class="bg-brand-bg border border-brand-accent/10 rounded-2xl p-6 text-center">
                        <div class="w-16 h-16 mx-auto rounded-full bg-brand-accent/20 flex items-center justify-center font-bold text-xl mb-4">J</div>
                        <h3 class="font-bold">Jauhari</h3>
                    </div>
                    <div class="bg-brand-bg border border-brand-accent/10 rounded-2xl p-6 text-center">
                        <div class="w-16 h-16 mx-auto rounded-full bg-brand-accent/20 flex items-center justify-center font-bold text-xl mb-4">M</div>
                        <h3 class="font-bold">Melvin</h3>
                    </div>
                    <div class="bg-brand-bg border border-brand-accent/10 rounded-2xl p-6 text-center">
                        <div class="w-16 h-16 mx-auto rounded-full bg-brand-accent/20 flex items-center justify-center font-bold text-xl mb-4">B</div>
                        <h3 class="font-bold">Bisma</h3>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-brand-dark text-white py-8 text-center text-sm opacity-60">
        <p>&copy; 2026 People in Earth. All rights reserved.</p>
    </footer>

</body>
</html>
